name: CI Expanded

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NOTCURSES_DEPS: "libnotcurses-dev cmake pkg-config lcov valgrind clang-tidy clang-format"

jobs:
  # ──────────────────────────────────────────────
  # Job 1: Build & Test Matrix (GCC/Clang x 22.04/24.04)
  # ──────────────────────────────────────────────
  build-and-test:
    name: Build & Test (${{ matrix.compiler }} on ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04]
        compiler: [gcc, clang]

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ env.NOTCURSES_DEPS }}
        env:
          DEBIAN_FRONTEND: noninteractive

      - name: Install Clang
        if: matrix.compiler == 'clang'
        run: sudo apt-get install -y clang

      - name: Set compiler
        run: |
          if [[ "${{ matrix.compiler }}" == "clang" ]]; then
            echo "CC=clang" >> $GITHUB_ENV
          else
            echo "CC=gcc" >> $GITHUB_ENV
          fi

      - name: Build
        run: make clean && make

      - name: Run all unit tests
        run: make test-all

      - name: Build shared library
        run: make shared

      - name: Run fuzz targets (smoke test)
        run: make fuzz-build

      - name: Run format check
        run: make fmt-check

  # ──────────────────────────────────────────────
  # Job 2: Static Analysis (clang-tidy)
  # ──────────────────────────────────────────────
  static-analysis:
    name: Static Analysis (clang-tidy)
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ env.NOTCURSES_DEPS }} clang-tidy

      - name: Run clang-tidy
        run: make tidy

  # ──────────────────────────────────────────────
  # Job 3: Format Check (clang-format)
  # ──────────────────────────────────────────────
  format-check:
    name: Format Check (clang-format)
    runs-on: ubuntu-24.04
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Install clang-format
        run: sudo apt-get update && sudo apt-get install -y clang-format

      - name: Run clang-format check
        run: make fmt-check

  # ──────────────────────────────────────────────
  # Job 4: ASAN + UBSan
  # ──────────────────────────────────────────────
  sanitizer-asan:
    name: ASAN + UBSan
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    env:
      ASAN_OPTIONS: detect_leaks=1:halt_on_error=1:abort_on_error=1
      UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ env.NOTCURSES_DEPS }}

      - name: Build with ASAN + UBSan and run tests
        run: make clean && make asan

  # ──────────────────────────────────────────────
  # Job 5: TSAN
  # ──────────────────────────────────────────────
  sanitizer-tsan:
    name: ThreadSanitizer
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    env:
      TSAN_OPTIONS: halt_on_error=1

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ env.NOTCURSES_DEPS }}

      - name: Build with TSAN and run tests
        run: make clean && make tsan

  # ──────────────────────────────────────────────
  # Job 6: Valgrind Memory Check
  # ──────────────────────────────────────────────
  valgrind-check:
    name: Valgrind Memory Check
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ env.NOTCURSES_DEPS }} valgrind

      - name: Build
        run: make clean && make

      - name: Run Valgrind
        run: make valgrind

      - name: Upload Valgrind report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: valgrind-report
          path: build/valgrind_report.txt
          retention-days: 30

  # ──────────────────────────────────────────────
  # Job 7: Code Coverage
  # ──────────────────────────────────────────────
  coverage:
    name: Code Coverage
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ env.NOTCURSES_DEPS }}

      - name: Build with coverage flags
        run: make clean && make coverage

      - name: Upload coverage report (HTML)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: build/coverage_report/
          retention-days: 30

      - name: Check coverage threshold
        run: |
          LINES_PCT=$(lcov --summary build/coverage.info 2>/dev/null | grep "lines\.\.\." | grep -oP '[\d.]+(?=%)' | head -1)
          echo "Line coverage: ${LINES_PCT}%"
          THRESHOLD=70
          if [ -z "$LINES_PCT" ] || [ "$(echo "$LINES_PCT < $THRESHOLD" | bc -l 2>/dev/null || echo 1)" = "1" ]; then
            echo "Coverage below ${THRESHOLD}% threshold (${LINES_PCT}%)!"
            exit 1
          fi
          echo "Coverage OK - above ${THRESHOLD}% threshold"

  # ──────────────────────────────────────────────
  # Job 8: ARM64 Cross-Build
  # ──────────────────────────────────────────────
  arm64-build:
    name: ARM64 Cross-Build
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Install QEMU + cross-compile tools
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-user-static gcc-aarch64-linux-gnu

      - name: Build for ARM64
        run: |
          make clean
          CC=aarch64-linux-gnu-gcc make

  # ──────────────────────────────────────────────
  # Job 9: Install Test
  # ──────────────────────────────────────────────
  install-test:
    name: Install Test
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ env.NOTCURSES_DEPS }}

      - name: Build
        run: make clean && make

      - name: Install to custom prefix
        run: |
          make PREFIX=/tmp/tmlcs-tui-install install PREFIX=/tmp/tmlcs-tui-install

      - name: Verify installation
        run: |
          test -f /tmp/tmlcs-tui-install/include/tmlcs-tui/tmlcs_tui.h
          test -f /tmp/tmlcs-tui-install/lib/pkgconfig/tmlcs-tui.pc
          test -f /tmp/tmlcs-tui-install/bin/mi_tui
          echo "Installation verified successfully"

      - name: Uninstall
        run: make uninstall PREFIX=/tmp/tmlcs-tui-install

      - name: Verify uninstallation
        run: |
          test ! -d /tmp/tmlcs-tui-install/include/tmlcs-tui || echo "Headers removed"
          test ! -f /tmp/tmlcs-tui-install/bin/mi_tui || echo "Binary removed"
