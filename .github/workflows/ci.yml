name: TMLCS-TUI CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# Cancel in-progress runs on new push to same PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NOTCURSES_DEPS_22: "libnotcurses-dev libpthread-stubs0-dev cmake pkg-config"
  NOTCURSES_DEPS_24: "libnotcurses-dev cmake pkg-config lcov valgrind clang-tidy"

jobs:
  # ──────────────────────────────────────────────
  # Job 1: Build + Test Matrix (GCC + Clang × 22.04 + 24.04)
  # ──────────────────────────────────────────────
  build-and-test:
    name: Build & Test (${{ matrix.compiler }} on ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04]
        compiler: [gcc, clang]

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          if [[ "${{ matrix.os }}" == "ubuntu-22.04" ]]; then
            sudo apt-get install -y ${{ env.NOTCURSES_DEPS_22 }}
          else
            sudo apt-get install -y ${{ env.NOTCURSES_DEPS_24 }}
          fi
        env:
          DEBIAN_FRONTEND: noninteractive

      - name: Cache apt packages
        uses: awalsh128/cache-apt-pkgs-action@v1.4.2
        with:
          packages: libnotcurses-dev cmake pkg-config lcov valgrind clang-tidy
          version: "1.0"
          execute_install_scripts: true

      - name: Install Clang
        if: matrix.compiler == 'clang'
        run: sudo apt-get install -y clang

      - name: Set compiler
        run: |
          if [[ "${{ matrix.compiler }}" == "clang" ]]; then
            echo "CC=clang" >> $GITHUB_ENV
          else
            echo "CC=gcc" >> $GITHUB_ENV
          fi

      - name: Build
        run: make clean && make

      - name: Run all unit tests
        run: make test-all

      - name: Build shared library
        run: make shared

      - name: Upload test runner artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-runner-${{ matrix.compiler }}-${{ matrix.os }}
          path: build/test_runner
          retention-days: 7

  # ──────────────────────────────────────────────
  # Job 2: Static Analysis (clang-tidy)
  # ──────────────────────────────────────────────
  static-analysis:
    name: Static Analysis (clang-tidy)
    runs-on: ubuntu-22.04
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ env.NOTCURSES_DEPS_22 }} clang-tidy

      - name: Run clang-tidy
        run: make tidy

  # ──────────────────────────────────────────────
  # Job 3: AddressSanitizer + UBSan
  # ──────────────────────────────────────────────
  sanitizer-asan:
    name: ASAN + UBSan (GCC)
    runs-on: ubuntu-22.04
    timeout-minutes: 10

    env:
      ASAN_OPTIONS: detect_leaks=1:halt_on_error=1:abort_on_error=1
      UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ env.NOTCURSES_DEPS_22 }}

      - name: Build with ASAN + UBSan and run tests
        run: make clean && make asan

  # ──────────────────────────────────────────────
  # Job 4: Code Coverage (gcov/lcov)
  # ──────────────────────────────────────────────
  coverage:
    name: Code Coverage
    runs-on: ubuntu-22.04
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ env.NOTCURSES_DEPS_22 }} lcov bc

      - name: Build with coverage flags
        run: make clean && make coverage

      - name: Upload coverage report (HTML)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: build/coverage_report/
          retention-days: 30

      - name: Upload coverage.info
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-info
          path: build/coverage_filtered.info
          retention-days: 30

      - name: Check coverage threshold
        run: |
          LINES_PCT=$(lcov --summary build/coverage_filtered.info 2>/dev/null | grep "lines\.\.\." | grep -oP '[\d.]+(?=%)' | head -1)
          echo "Line coverage: ${LINES_PCT}%"
          THRESHOLD=70
          if [ -z "$LINES_PCT" ] || [ "$(echo "$LINES_PCT < $THRESHOLD" | bc -l 2>/dev/null || echo 1)" = "1" ]; then
            echo "Coverage below ${THRESHOLD}% threshold (${LINES_PCT}%)!"
            exit 1
          fi
          echo "Coverage OK — above ${THRESHOLD}% threshold"

  # ──────────────────────────────────────────────
  # Job 5: Valgrind Memory Check
  # ──────────────────────────────────────────────
  valgrind-check:
    name: Valgrind Memory Check
    runs-on: ubuntu-22.04
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ env.NOTCURSES_DEPS_22 }} valgrind

      - name: Build
        run: make clean && make

      - name: Run Valgrind on test_runner
        run: make valgrind

      - name: Upload Valgrind report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: valgrind-report
          path: build/valgrind_report.txt
          retention-days: 30

  # ──────────────────────────────────────────────
  # Job 6: Clang Build (compatibility check)
  # ──────────────────────────────────────────────
  clang-build:
    name: Clang Compatibility Build
    runs-on: ubuntu-22.04
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ env.NOTCURSES_DEPS_22 }} clang

      - name: Build with Clang
        run: make clean && CC=clang make

      - name: Run tests with Clang build
        run: CC=clang make test-all

  # ──────────────────────────────────────────────
  # Job 7: ARM64 Build (QEMU cross-architecture)
  # ──────────────────────────────────────────────
  arm64-build:
    name: ARM64 Build
    runs-on: ubuntu-22.04
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Install QEMU + cross-compile tools
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-user-static gcc-aarch64-linux-gnu

      - name: Build for ARM64
        run: |
          make clean
          CC=aarch64-linux-gnu-gcc make

  # ──────────────────────────────────────────────
  # Job 8: Format Check (clang-format)
  # ──────────────────────────────────────────────
  format-check:
    name: Format Check (clang-format)
    runs-on: ubuntu-24.04
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Install clang-format
        run: sudo apt-get update && sudo apt-get install -y clang-format

      - name: Run clang-format check
        run: make fmt-check

  # ──────────────────────────────────────────────
  # Job 9: ThreadSanitizer
  # ──────────────────────────────────────────────
  sanitizer-tsan:
    name: ThreadSanitizer
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    env:
      TSAN_OPTIONS: halt_on_error=1

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libnotcurses-dev cmake pkg-config

      - name: Build with TSAN and run tests
        run: make clean && make tsan

  # ──────────────────────────────────────────────
  # Job 10: Install Test
  # ──────────────────────────────────────────────
  install-test:
    name: Install Test
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libnotcurses-dev cmake pkg-config

      - name: Build
        run: make clean && make

      - name: Install to custom prefix
        run: make PREFIX=/tmp/tmlcs-tui-install install

      - name: Verify installation
        run: |
          test -f /tmp/tmlcs-tui-install/include/tmlcs-tui/tmlcs_tui.h
          test -f /tmp/tmlcs-tui-install/lib/pkgconfig/tmlcs-tui.pc
          test -f /tmp/tmlcs-tui-install/bin/mi_tui
          echo "Installation verified successfully"

      - name: Uninstall
        run: make uninstall PREFIX=/tmp/tmlcs-tui-install

      - name: Verify uninstallation
        run: |
          test ! -d /tmp/tmlcs-tui-install/include/tmlcs-tui || echo "Headers removed"
          test ! -f /tmp/tmlcs-tui-install/bin/mi_tui || echo "Binary removed"
